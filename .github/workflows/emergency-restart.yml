name: Emergency - Restart Backend

on:
  workflow_dispatch:

env:
  CONTAINER_APP_NAME: bingo-api
  RESOURCE_GROUP: bingo-game-rg

jobs:
  restart-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Reactivate latest revision
        uses: azure/CLI@v1
        with:
          inlineScript: |
            echo "RESTARTING BACKEND - Reactivating latest revision for ${{ env.CONTAINER_APP_NAME }}"

            LATEST_REVISION=$(az containerapp revision list \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --query "sort_by([], &properties.createdTime)[-1].name" \
              --output tsv)

            echo "Activating revision: $LATEST_REVISION"

            az containerapp revision activate \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --revision "$LATEST_REVISION"

            echo "Backend is now ONLINE."

      - name: Verify backend is up
        uses: azure/CLI@v1
        with:
          inlineScript: |
            ACTIVE_REVISIONS=$(az containerapp revision list \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --query "[?properties.active==\`true\`].name" \
              --output tsv)

            if [ -n "$ACTIVE_REVISIONS" ]; then
              echo "SUCCESS: Backend is back online. Active revision: $ACTIVE_REVISIONS"
            else
              echo "WARNING: No active revisions found. Restart may have failed."
            fi

      - name: Health check
        run: |
          echo "Waiting 30 seconds for container to start..."
          sleep 30
          API_URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          echo "Testing API at https://$API_URL"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$API_URL" || echo "failed")
          echo "Health check returned HTTP status: $STATUS"