name: Emergency - Restart Backend

on:
  workflow_dispatch:

env:
  CONTAINER_APP_NAME: bingo-api
  RESOURCE_GROUP: bingo-game-rg

jobs:
  restart-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Reactivate all revisions
        uses: azure/CLI@v1
        with:
          inlineScript: |
            echo "RESTARTING BACKEND - Reactivating revisions for ${{ env.CONTAINER_APP_NAME }}"

            REVISIONS=$(az containerapp revision list \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --query "[].name" \
              --output tsv)

            if [ -z "$REVISIONS" ]; then
              echo "ERROR: No revisions found. Cannot restart."
              exit 1
            fi

            for REVISION in $REVISIONS; do
              echo "Activating revision: $REVISION"
              az containerapp revision activate \
                --name ${{ env.CONTAINER_APP_NAME }} \
                --resource-group ${{ env.RESOURCE_GROUP }} \
                --revision "$REVISION" || true
            done

            echo "Backend is now ONLINE."

      - name: Verify backend is up
        uses: azure/CLI@v1
        with:
          inlineScript: |
            ACTIVE_REVISIONS=$(az containerapp revision list \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --query "[?properties.active==\`true\`].name" \
              --output tsv)

            if [ -n "$ACTIVE_REVISIONS" ]; then
              echo "SUCCESS: Backend is back online. Active revision: $ACTIVE_REVISIONS"
            else
              echo "WARNING: No active revisions found. Restart may have failed."
            fi

      - name: Health check
        uses: azure/CLI@v1
        with:
          inlineScript: |
            echo "Waiting 45 seconds for container to start..."
            sleep 45
            API_URL=$(az containerapp show \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --query properties.configuration.ingress.fqdn \
              --output tsv)
            echo "Testing API at https://$API_URL"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$API_URL" || echo "failed")
            if [ "$STATUS" = "200" ]; then
              echo "SUCCESS: Health check returned HTTP 200"
            else
              echo "WARNING: Health check returned HTTP $STATUS (cold start may need more time)"
            fi